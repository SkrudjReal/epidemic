  tutorial_2: >
    🦠 <code>𝐄𝐩𝐢𝐝𝐞𝐦𝐢𝐜 𝐍𝐨𝐭𝐢𝐟𝐲</code> | <b>#обучение</b>
    
    
    <b>Здесь вы можете ознакомиться с характеристиками своей лаборатории. По ключевым словам ниже, сможете прокачать то что вам необходимо.</b>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    <blockquote><b><u>🦠 Для начала взгляни на свои умения.</u></b>
    

    — «<b>Заразность</b>» – возможность заражать других пользователей.

    — «<b>Иммунитет</b>» – защита от заражений, сложнее поддаться вирусам.

    — «<b>Летальность</b>» – определяет, как долго твой вирус будет активен.

    — «<b>Безопасности</b>» – выявляет тех, кто пытается заразить твою лабораторию. 
    

    <b><u>🦠 Развитие разработки для распространения твоих вирусов — важно.</u></b>

    — «<b>Патоген</b>» – количество доступных попыток заразить других.

    — «<b>Разработка</b>» - квалификация учёных ускоряет создание новых патогенов.</blockquote>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    Посмотреть возможные усиления умений, можно командой «<code>+</code>». Команда «<code>++</code>» подтвердит действия прокачки.

    Пример: <a href="https://t.me/epidemic_gamebot?text=%2B%2Bлетальность">++летальность</a> /  <a href="https://t.me/epidemic_gamebot?text=%2B%2Bразработка">++разработка</a> и т.д.
  
  tutorial_3: >
    🦠 <code>𝐄𝐩𝐢𝐝𝐞𝐦𝐢𝐜 𝐍𝐨𝐭𝐢𝐟𝐲</code> | <b>#обучение</b>
    
    
    <b>Запасы реагентов – ключ к развитию лаборатории и усилению твоих возможностей.</b>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    Раз в сутки 22:00 по МСК начисляется сумма накопленного био-опыта. Летальность влияет на время нахождения заражённых в списке ежедневной премии. Чтобы обновить срок, необходимо повторно заразить пользователя. При заражении возможен как прирост, так и снижение получаемых био-ресурсов.
    
    
    <blockquote>🦠 Ресурсы:

    —  Био-опыт – получаешь при заражении чужих лабораторий. Влияет на твою ежедневную премию и зависит от летальности вируса.

    —  Био-ресурсы – начисляются раз в день 22:00 по МСК и увеличиваются за счёт накопленного био-опыта.

    —  Ежедневная премия – сумма всех твоих заражений за день, превращённая в био-ресурсы.</blockquote>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    Список своих жертв можно получить с помощью команды «<a href="https://t.me/epidemic_gamebot?text=мои+жертвы">мои жертвы</a>», также там можно посмотреть ежедневную премию.
  
  tutorial_4: >
    🦠 <code>𝐄𝐩𝐢𝐝𝐞𝐦𝐢𝐜 𝐍𝐨𝐭𝐢𝐟𝐲</code> | <b>#обучение</b>
    
    
    <b>Попробуйте заразить кого-то и посмотреть, что с этого получится.</b>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    <b>Доступные команды:</b>

    — «<a href="https://t.me/epidemic_gamebot?text=заразить+%2B">заразить +</a>» – для сильного заражения.

    — «<a href="https://t.me/epidemic_gamebot?text=заразить+%3D">заразить =</a>» – для обычного заражения.

    — «<a href="https://t.me/epidemic_gamebot?text=заразить+-">заразить -</a>» – для ослабленного заражения.
    
    
    Также, можете заразить по юзернейму или айди пользователя.

    <b>Напишите</b> «<a href="https://t.me/epidemic_gamebot?text=заразить+@777000">заразить @777000</a>»
    
    
    🦠 Команда «<a href="https://t.me/epidemic_gamebot?text=биотоп">биотоп</a>» открывает список пользователей с наибольшим количеством био-опыта. С помощью него вы можете заражать потенциально прибыльных жертв. 


    ❇️—❎—✳️—💚—✳️—❎—❇️
  
  tutorial_5: >
    🦠 <code>𝐄𝐩𝐢𝐝𝐞𝐦𝐢𝐜 𝐍𝐨𝐭𝐢𝐟𝐲</code> | <b>#обучение</b>
    
    
    <b><u>Корпорации</u> – это содружества учёных, работающих вместе для развития лабораторий. Участники обмениваются жертвами, заражают потенциально прибыльных жертв друг другу и усиливают своё влияние в био-войнах.</b>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    — «<a href="https://t.me/epidemic_gamebot?text=.корп+топ">.корп топ</a>» – посмотреть рейтинг лучших корпораций.

    — «<a href="https://t.me/epidemic_gamebot?text=.корп">.корп</a>» – узнать характеристики своей корпорации.

    — «<a href="https://t.me/epidemic_gamebot?text=.корп+создать+название">.корп создать "название"</a>» - ваша личная корпорация.

    — «<a href="https://t.me/epidemic_gamebot?text=%2Bкорп+досье">- или +корп досье</a>» - скрыть/открыть список участников корпорации.

    — «<a href="https://t.me/epidemic_gamebot?text=%2Bкорп+код">-корп или +корп "код"</a>» - покинуть корпорацию или вступить в неё.
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    <blockquote>У каждой корпорации свои взгляды на развитие и продвижение по топу, от вас зависит где вы будете состоять и на какую роль претендовать.</blockquote>
  
  tutorial_6: >
    🦠 <code>𝐄𝐩𝐢𝐝𝐞𝐦𝐢𝐜 𝐍𝐨𝐭𝐢𝐟𝐲</code> | <b>#обучение</b>
    
    
    <b>Юзербот – это инструмент, который автоматизирует некоторые процессы в Эпидемике. Когда бот сидит на аккаунте пользователя и выполняет поставленные задачи. Бот автоматизирует действия, позволяя упростить процесс геймплея.</b>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    <blockquote>Позволяет пользователям  упростить процесс заражения, автоматизировать запись жертв, имеет систему доверенных пользователей.  Встроенный калькулятор помогает рассчитывать био-ресурсы для прокачки навыков.  Дополнительная функция автоудаления сообщений способствуют поддержанию чистоты чата.</blockquote>
    
    
    <i>Злоупотребление полной автоматизацией процесса. В этот пункт входит АО — АвтоОтвет, бот без участия пользователя заражает людей. Этот пункт касается сторонних юзерботов, так как в официальной версии нет такой функции.</i>
    
    
    ❇️—❎—✳️—💚—✳️—❎—❇️
    
    
    <b>🦠Подробнее о Юзерботе можно узнать здесь:</b> @epidemic_support_bot
  
